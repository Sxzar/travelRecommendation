<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="./travel_recommendation.css" />
</head>

<body class="home-bg">
  <header class="mainHeader">
    <div class="mainHeader__container container">
      <a href="/" class="mainHeader__logo">Travel Bloom</a>
      <!-- mobile -->
      <input type="checkbox" id="mainHeader-menu-toggle" class="mainHeader__toggle" />
      <label for="mainHeader-menu-toggle" class="mainHeader__burger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </label>
       <nav class="mainHeader__nav">
        <ul class="mainHeader__nav-list">
          <li>
            <a href="./index.html">Home</a>
          </li>

          <li>
            <a href="./about-us.html">About Us</a>
          </li>

          <li>
            <a href="./contact-us.html">Contact Us</a>
          </li>
        </ul>
        <form action="" class="mainHeader__search mainHeader__search--mobile">
          <input type="text" class="searchInput" placeholder="Enter a destination or keyword" />
          <div class="mainHeader__search-buttons">
            <button type="submit">Search</button>
            <button type="button" class="clearBtn">Clear</button>
          </div>
        </form>

      </nav>
      <form action="" class="mainHeader__search">
        <input type="text" class="searchInput" placeholder="Enter a destination or keyword" />
        <button type="submit">Search</button>
        <button type="button" class="clearBtn">Clear</button>
      </form>
    </div>
  </header>
  <main>
    <section class="container contact">
      <h1>Contact us</h1>
      <form action="#" class="contact-form" method="post">
        <div class="form-grid">
          <div>
            <label for="firstName">First Name</label>
            <input type="text" name="firstName" id="firstName" required>
          </div>
          <div>
            <label for="lastName">Last Name</label>
            <input type="text" name="lastName" id="lastName" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input type="text" name="email" id="email" required>
          </div>
          <div>
            <label for="phone">Phone</label>
            <input type="text" name="phone" id="phone">
          </div>
          <div class="full-width">
            <label for="subject">Subject</label>
            <input type="text" name="subject" id="subject">
          </div>
          <div class="full-width">
            <label for="message">Message</label>
            <textarea type="text" name="message" id="message"></textarea>
          </div>
          <button type="submit" class="primaryButton">Submit</button>
        </div>

      </form>
    </section>
  </main>

  <!-- scripts -->
  <script src="./travel_recommendation.js"></script>
</body>

</html>
